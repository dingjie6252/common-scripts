#---------------------------------------------------#
## Mihomo (Clash Meta) 配置文件
## 
## 当前配置:
## - Hysteria2/VMess/VLESS 代理
## - TUN 模式支持
## - 优化 DNS 解析
## - 自动分流规则
## - GeoIP 数据库支持
##
## 优化版本 - 2025-11-22
#---------------------------------------------------#

# 性能优化配置
profile:
  store-selected: true  # 记住手动选择的节点
  store-fake-ip: true   # 持久化 fake-ip

# TCP 并发连接
tcp-concurrent: true

# 统一延迟测试
unified-delay: true

# GeoIP 数据库配置
geodata-mode: true
geodata-loader: memconservative
geo-auto-update: true  # 开启自动更新
geo-update-interval: 24  # 每 24 小时检查更新

# GeoIP 数据库下载地址
geox-url:
  geoip: "https://cdn.gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoIP.dat"
  geosite: "https://cdn.gh-proxy.org/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"

# 通用代理端口：同时支持HTTP和SOCKS5协议
mixed-port: 7890

# 仅HTTP协议专用端口
port: 7891

# 仅SOCKS5协议专用端口
socks-port: 7892

# 是否允许来自局域网的连接
allow-lan: true

# 监听地址，"*"表示监听所有地址
bind-address: "*"

# 运行模式：rule（规则模式）
mode: rule

# 日志级别：silent/error/warning/info/debug
# 建议使用 info 或 warning 方便排查问题
log-level: warning

# 域名嗅探（Sniffer）- 提升分流准确性
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'

# 控制面板访问地址和端口
external-controller: 0.0.0.0:9090

# MetaCubeX 界面
external-ui: ui

# 访问控制面板的密码
secret: "DingJie0925"

# DNS 设置（优化版）
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  cache-size: 16384  # 增加 DNS 缓存大小（原 8192）
  
  # 基础 DNS 服务器（用于解析 DoH 服务器域名）
  default-nameserver:
    - 1.1.1.1          # Cloudflare
    - 8.8.8.8          # Google
  
  # 国内 DNS（DoH 加密 + UDP 备份）
  nameserver:
    - https://doh.pub/dns-query           # 腾讯 DoH
    - https://dns.alidns.com/dns-query    # 阿里 DoH

  # 国外 DNS（用于国外域名解析）
  fallback:
    - https://1.1.1.1/dns-query      # Cloudflare DoH
    - https://8.8.8.8/dns-query      # Google DoH
    - tls://8.8.8.8:853              # Google DoT
    - tls://1.1.1.1:853              # Cloudflare DoT

  # Fake-IP 过滤器（只包含域名模式）
  fake-ip-filter:
    # Speedtest.net
    - '*.speedtest.net'
    - '*.ookla.com'
    - '*.speedtestcustom.com'
    # 本地域名
    - '*.lan'
    - '*.localdomain'
    - '*.example'
    - '*.invalid'
    - '*.localhost'
    - '*.test'
    - '*.local'
    - '*.home.arpa'
    
    # 时间服务
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'time.*.apple.com'
    - 'time1.*.com'
    - 'time2.*.com'
    - 'time3.*.com'
    - 'time4.*.com'
    - 'time5.*.com'
    - 'time6.*.com'
    - 'time7.*.com'
    - 'ntp.*.com'
    - 'ntp1.*.com'
    - 'ntp2.*.com'
    - 'ntp3.*.com'
    - 'ntp4.*.com'
    - 'ntp5.*.com'
    - 'ntp6.*.com'
    - 'ntp7.*.com'
    - '*.time.edu.cn'
    - '*.ntp.org.cn'
    - '+.pool.ntp.org'
    - 'time1.cloud.tencent.com'
    
    # 音乐服务
    - 'music.163.com'
    - '*.music.163.com'
    - '*.126.net'
    - 'musicapi.taihe.com'
    - 'music.taihe.com'
    - 'songsearch.kugou.com'
    - 'trackercdn.kugou.com'
    - '*.kuwo.cn'
    - 'api-jooxtt.sanook.com'
    - 'api.joox.com'
    - 'joox.com'
    - 'y.qq.com'
    - '*.y.qq.com'
    - 'streamoc.music.tc.qq.com'
    - 'mobileoc.music.tc.qq.com'
    - 'isure.stream.qqmusic.qq.com'
    - 'dl.stream.qqmusic.qq.com'
    - 'aqqmusic.tc.qq.com'
    - 'amobile.music.tc.qq.com'
    - '*.xiami.com'
    - '*.music.migu.cn'
    - 'music.migu.cn'
    
    # Windows 连接测试
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - 'msftconnecttest.com'
    - 'msftncsi.com'
    
    # QQ 登录
    - 'localhost.ptlogin2.qq.com'
    - 'localhost.sec.qq.com'
    
    # 游戏平台
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - 'xbox.*.microsoft.com'
    - 'xnotify.xboxlive.com'
    - '+.battlenet.com.cn'
    - '+.wotgame.cn'
    - '+.wggames.cn'
    - '+.wowsgame.cn'
    - '+.wargaming.net'
    - '*.square-enix.com'
    - '*.finalfantasyxiv.com'
    - '*.ffxiv.com'
    
    # 其他服务
    - 'proxy.golang.org'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.stun.*.*.*.*'
    - 'heartbeat.belkin.com'
    - '*.linksys.com'
    - '*.linksyssmartwifi.com'
    - '*.router.asus.com'
    - 'mesu.apple.com'
    - 'swscan.apple.com'
    - 'swquery.apple.com'
    - 'swdownload.apple.com'
    - 'swcdn.apple.com'
    - 'swdist.apple.com'
    - 'lens.l.google.com'
    - 'stun.l.google.com'
    - '+.nflxvideo.net'
    - '*.mcdn.bilivideo.cn'
  
  # DNS 分流规则
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      # 内网 IP 段
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
    domain:
      # 强制使用国外 DNS 解析的域名
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'
      - '+.githubusercontent.com'
      - '+.googlevideo.com'

# TUN 模式设置（优化版）
tun:
  enable: true
  stack: system
  device: utun
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1400
  strict-route: true

