    type: select
    proxies:
      - auto
      - racknerd-hy2
      - Snippets-vless
      - Snippets-vless 2
      - Snippets-vless 3
      - Snippets-vless 4
      - Snippets-vless 5
      - Snippets-vless 6
      - Snippets-vless 7
      - Snippets-vless 8
      - Snippets-vless 9
      - Snippets-vless 10
      - DIRECT

  # 自动选择（延迟最低）
  - name: auto
    type: url-test
    proxies:
      - racknerd-hy2
      - Snippets-vless
      - Snippets-vless 2
      - Snippets-vless 3
      - Snippets-vless 4
      - Snippets-vless 5
      - Snippets-vless 6
      - Snippets-vless 7
      - Snippets-vless 8
      - Snippets-vless 9
      - Snippets-vless 10
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 20

# 规则集（优化版 - 使用本地路径）
rule-providers:
  apple-proxy:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Hackl0us/SS-Rule-Snippet@master/Rulesets/Clash/Basic/Apple-proxy.yaml"
    path: ./ruleset/Apple-proxy.yaml
    interval: 86400  # 每天更新一次

  apple-direct:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Hackl0us/SS-Rule-Snippet@master/Rulesets/Clash/Basic/Apple-direct.yaml"
    path: ./ruleset/Apple-direct.yaml
    interval: 86400

  cn:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Hackl0us/SS-Rule-Snippet@master/Rulesets/Clash/Basic/CN.yaml"
    path: ./ruleset/CN.yaml
    interval: 86400

  ad-keyword:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Hackl0us/SS-Rule-Snippet@master/Rulesets/Clash/Basic/common-ad-keyword.yaml"
    path: ./ruleset/common-ad-keyword.yaml
    interval: 86400

  foreign:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Hackl0us/SS-Rule-Snippet@master/Rulesets/Clash/Basic/foreign.yaml"
    path: ./ruleset/foreign.yaml
    interval: 86400

  telegram:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Hackl0us/SS-Rule-Snippet@master/Rulesets/Clash/App/social/Telegram.yaml"
    path: ./ruleset/Telegram.yaml
    interval: 86400

  lan:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Hackl0us/SS-Rule-Snippet@master/Rulesets/Clash/Basic/LAN.yaml"
    path: ./ruleset/LAN.yaml
    interval: 86400

# 最终规则（优化顺序）
rules:
  # 1. 局域网直连（最常匹配，放在最前面）
  - RULE-SET,lan,DIRECT
  
  # 2. 广告拦截（提前拦截，节省流量）
  - RULE-SET,ad-keyword,REJECT
  - GEOSITE,category-ads-all,REJECT  # GeoSite 广告拦截
  
  # 3. 特定应用规则
  - GEOSITE,ookla-speedtest,DIRECT
  - DOMAIN-SUFFIX,speedtest.net,DIRECT
  - DOMAIN-SUFFIX,ookla.com,DIRECT
  - DOMAIN-KEYWORD,speedtest,DIRECT
  - RULE-SET,telegram,Proxy
  - GEOSITE,telegram,Proxy  # GeoSite Telegram 规则
  - GEOSITE,google,Proxy    # Google 服务走代理
  - GEOSITE,github,Proxy    # GitHub 走代理
  
  # 4. 苹果服务分流
  - RULE-SET,apple-direct,DIRECT
  - RULE-SET,apple-proxy,Proxy
  - GEOSITE,apple,DIRECT    # GeoSite 苹果服务
  
  # 5. 国内外网站分流
  - RULE-SET,cn,DIRECT
  - RULE-SET,foreign,Proxy
  - GEOSITE,CN,DIRECT       # GeoSite 中国网站直连
  - GEOSITE,geolocation-!cn,Proxy  # GeoSite 非中国网站走代理
  
  # 6. GeoIP 规则（中国IP直连）
  - GEOIP,CN,DIRECT
  
  # 7. 默认规则（其他所有流量走代理）
  - MATCH,Proxy

#---------------------------------------------------#
## 优化说明:
##
## 1. 添加了性能优化配置（profile, tcp-concurrent, unified-delay）
## 2. 添加了 GeoIP 数据库配置
## 3. 修复了 fake-ip-filter（移除了 IP 段）
## 4. 优化了 DNS 配置（添加了更多 DoH 服务器）
## 5. 完善了 TUN 模式配置
## 6. 改进了代理组（添加了 auto 组）
## 7. 优化了规则顺序（性能更好）
## 8. 调整了日志级别为 info（方便排查问题）
## 9. 规则集更新间隔改为 24 小时（86400 秒）
##
## 使用方法:
## 1. 替换代理服务器中的 "ip" 为实际服务器地址
## 2. 确保 GeoIP.dat 和 geosite.dat 文件在 config 目录下
## 3. 确保规则集文件在 config/ruleset/ 目录下
## 4. 访问 http://[IP]:9090/ui 使用控制面板
## 5. 密码: wallentv
